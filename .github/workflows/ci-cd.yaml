name: CI/CD Pipeline for Assignment 1

on:
  push:
    branches:
      - test
  pull_request:
    branches:
      - test

jobs:
  run-tests:
    runs-on: ubuntu-latest
    name: Run Unit Tests for Assignment 1

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest  # Ensure pytest is installed
          if [ -f "AISC2013-Deployment/Assignment 1/requirements.txt" ]; then
            pip install -r AISC2013-Deployment/Assignment 1/Rodrigo UI/requirements.txt
          fi

      - name: Run Unit Tests for Rodrigo's UI
        run: |
          python -m pytest AISC2013-Deployment/Assignment 1/tests/ui_test_1.py

      - name: Run Basic Tests (Placeholder)
        run: |
          echo "No test framework detected. Running a placeholder test script."
          python -c "print('Placeholder Test Passed')"

      - name: SonarQube Analysis (Optional)
        if: ${{ false }}
        run: |
          echo "SonarQube setup step placeholder here."
          # Add your SonarQube scan commands here if needed.

      - name: Exclude Jupyter Notebooks from Deployment
        run: |
          echo "Excluding Jupyter Notebooks from the deployment code."
          find . -name '*.ipynb' -exec rm -f {} \;

      - name: Upload Results to GitHub
        if: always()
        run: |
          echo "CI/CD Pipeline for Assignment 1 completed."
