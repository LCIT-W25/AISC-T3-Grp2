name: CI Test

on:
  push:
    branches:
      - dev
      - test
  pull_request:
    branches:
      - dev
      - test

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3  # Latest version

      - name: Set up Python 3.12
        uses: actions/setup-python@v4  # Latest setup-python action
        with:
          python-version: "3.12"

      - name: Verify File Structure (Debugging Step)
        run: |
          echo "Listing all files and directories:"
          ls -R

      # Install dependencies and run tests for prakash_image_class_ui
      - name: Install dependencies for prakash_image_class_ui
        run: |
          cd AISC2013-Deployment/assignment_1/prakash_image_class_ui
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests for prakash_image_class_ui
        run: |
          cd AISC2013-Deployment/assignment_1/prakash_image_class_ui
          source venv/bin/activate
          python -m unittest ui_test_2.py  # Using unittest instead of pytest

      # Install dependencies and run tests for Rodrigo UI
      - name: Install dependencies for Rodrigo UI
        run: |
          cd AISC2013-Deployment/assignment_1/Rodrigo\ UI
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests for Rodrigo UI
        run: |
          cd AISC2013-Deployment/assignment_1/Rodrigo\ UI
          source venv/bin/activate
          python -m unittest ui_test_1.py  # Using unittest instead of pytest

      - name: SonarQube Analysis (Optional)
        if: ${{ github.event_name == 'push' }}
        run: |
          echo "Running SonarQube Analysis..."
          # Add actual SonarQube scan commands here if needed.

      - name: Exclude Jupyter Notebooks from Deployment
        run: |
          echo "Excluding Jupyter Notebooks from the deployment code."
          find . -name '*.ipynb' -exec rm -f {} \;

      - name: Upload Results to GitHub
        if: always()
        run: |
          echo "CI/CD Pipeline for AISC-T3-GRP2 completed."