<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Classification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "light-blue": "#E6F3FF",
            },
            backdropBlur: {
              custom: "20px",
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-gradient-to-br from-light-blue to-blue-100">
    <div class="container mx-auto px-4 py-8">
      <h1 class="text-4xl font-bold text-gray-800 text-center mb-8">
        Image Classification
      </h1>

      <div class="w-full max-w-xl mx-auto mb-6">
        <label
          for="model-select"
          class="block text-sm font-medium text-gray-700 mb-2"
          >Select Model:</label
        >
        <select
          id="model-select"
          class="w-full p-2 bg-white/70 backdrop-blur-sm border border-gray-200 rounded-lg shadow-sm"
        >
          <option value="dnn">DNN Model</option>
          <option value="knn">kNN Model</option>
        </select>
      </div>

      <div class="grid gap-6 max-w-xl mx-auto">
        <div class="bg-white/70 backdrop-blur-sm rounded-3xl shadow-xl p-6">
          <h2 class="text-2xl font-semibold text-gray-800 mb-4">
            Upload Image
          </h2>
          <form
            action="{{ url_for('predict_dnn') }}"
            method="POST"
            enctype="multipart/form-data"
            class="space-y-4"
          >
            <div
              class="upload-area border-2 border-dashed border-blue-200 rounded-2xl p-8 text-center cursor-pointer hover:border-blue-300 transition-colors"
            >
              <label
                for="image-upload"
                id="upload-label"
                class="cursor-pointer"
              >
                <div id="upload-icon" class="text-4xl mb-2">📁</div>
                <span class="text-gray-600">Click to upload</span>
              </label>
              <input
                type="file"
                name="file"
                id="image-upload"
                accept="image/*"
                class="hidden"
              />
            </div>

            <button
              type="submit"
              class="w-full py-3 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 focus:ring-2 focus:ring-indigo-500"
            >
              Predict
            </button>
          </form>

          {% if prediction %}
          <div class="mt-6 text-center text-lg font-medium text-gray-700">
            <p><strong>Prediction:</strong> {{ prediction }}</p>
            {% if image %}
            <img
              src="{{ url_for('static', filename='uploads/' + image) }}"

            />
            {% endif %}
          </div>
          {% endif %} {% if error %}
          <p class="mt-4 text-red-500 text-center">{{ error }}</p>
          {% endif %} {% if prediction %}
          <img
            id="preview-image"
            src="/placeholder.svg"
            alt="Preview"
            class="hidden mt-4 rounded-xl max-h-48 mx-auto"
          />
          {% else %}
          <img
            id="preview-image"
            src="/placeholder.svg"
            alt="Preview"
            class="hidden mt-4 rounded-xl max-h-48 mx-auto"
          />
          {% endif %}
          <p id="file-name" class="hidden mt-2 text-gray-600 text-center"></p>
        </div>
      </div>
    </div>

    <script src="{{ url_for('static', filename='scripts.js') }}"></script>
  </body>
</html>
